<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}xwayland.com{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/blog.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="logo">x<span>wayland</span>.com</a>
      <nav class="nav-links">
        <a href="/">home</a>
        <a href="/archive">archive</a>
        <a href="/about">about</a>
        <a href="/rss.xml">rss</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <span class="logo">x<span>wayland</span>.com</span>
      <p>thoughts on Linux, Wayland, and systems software.</p>
    </div>
  </footer>
</body>
</html>
